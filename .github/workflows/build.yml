name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Unzip and Inspect
      run: |
        if [ -f guardian-one.zip ]; then
          unzip -o guardian-one.zip
        fi
        echo "=== قائمة الملفات كاملة ==="
        find . -maxdepth 4 -not -path '*/.*'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Run Build Logic
      run: |
        # البحث عن ملف build.gradle أو build.gradle.kts
        BUILD_FILE=$(find . -name "build.gradle*" | head -n 1)
        
        if [ -z "$BUILD_FILE" ]; then
          echo "❌ خطأ: لم يتم العثور على ملف build.gradle في المشروع!"
          exit 1
        fi
        
        PROJECT_DIR=$(dirname "$BUILD_FILE")
        cd "$PROJECT_DIR"
        echo "📁 تم العثور على المشروع في: $PROJECT_DIR"
        
        # تجربة التشغيل باستخدام gradlew أو gradle المثبت في النظام
        if [ -f "./gradlew" ]; then
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace
        else
          echo "⚙️ تشغيل البناء عبر Gradle الافتراضي..."
          gradle assembleDebug --stacktrace
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/*.apk"
        
