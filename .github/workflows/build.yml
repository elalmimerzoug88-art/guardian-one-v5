name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Unzip project if present
      run: |
        if [ -f guardian-one.zip ]; then
          echo "📦 فك ضغط guardian-one.zip..."
          unzip -o guardian-one.zip
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Locate Project & Build APK
      run: |
        echo "🔍 البحث عن مسار build.gradle.kts أو build.gradle..."
        BUILD_FILE=$(find . -name "build.gradle.kts" -o -name "build.gradle" | head -n 1)
        
        if [ -z "$BUILD_FILE" ]; then
          echo "❌ لم يتم العثور على ملف build.gradle!"
          exit 1
        fi

        PROJECT_DIR=$(dirname "$BUILD_FILE")
        echo "📁 تم العثور على المشروع في المجلد: $PROJECT_DIR"
        cd "$PROJECT_DIR"

        if [ -f "./gradlew" ]; then
          echo "🚀 تشغيل البناء باستخدام ./gradlew ..."
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace
        elif [ -f "../gradlew" ]; then
          echo "🚀 تشغيل البناء باستخدام ../gradlew ..."
          chmod +x ../gradlew
          ../gradlew assembleDebug --stacktrace
        else
          echo "🚀 تشغيل البناء باستخدام Gradle النظام..."
          gradle assembleDebug --stacktrace
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/outputs/apk/debug/*.apk"
        
