name: Inspect Repository Structure

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Unzip & Print Directory Tree
      run: |
        if [ -f guardian-one.zip ]; then
          unzip -o guardian-one.zip
        fi
        echo "=== 📁 هيكلية الملفات كاملة ==="
        find . -maxdepth 4 -not -path '*/.*'
        
