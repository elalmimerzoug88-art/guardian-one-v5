name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Unzip project if present
      run: |
        if [ -f guardian-one.zip ]; then
          unzip -o guardian-one.zip
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Locate and Build APK
      run: |
        # البحث الديناميكي عن موقع ملف gradlew
        GRADLEW_FILE=$(find . -name "gradlew" -type f | head -n 1)

        if [ -z "$GRADLEW_FILE" ]; then
          echo "❌ لم يتم العثور على gradlew، جارٍ البحث عن build.gradle.kts..."
          BUILD_FILE=$(find . -name "build.gradle.kts" -o -name "build.gradle" | head -n 1)
          if [ -n "$BUILD_FILE" ]; then
            TARGET_DIR=$(dirname "$BUILD_FILE")
            cd "$TARGET_DIR"
            gradle assembleDebug --stacktrace
          else
            echo "❌ لم يتم العثور على ملفات مشروع أندرويد!"
            exit 1
          fi
        else
          TARGET_DIR=$(dirname "$GRADLEW_FILE")
          echo "📁 تم العثور على المشروع في: $TARGET_DIR"
          cd "$TARGET_DIR"
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/*.apk"
        
