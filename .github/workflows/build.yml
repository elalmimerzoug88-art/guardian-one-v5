name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Unzip project
      run: |
        if [ -f guardian-one.zip ]; then
          unzip -o guardian-one.zip
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Android App directly from guardian-one
      run: |
        # 1. الدخول للمجلد الحقيقي لتطبيق الأندرويد
        cd guardian-one

        # 2. إعطاء الصلاحية وتنفيذ بناء الأندرويد الحقيقي
        chmod +x ./gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: guardian-one-apk
        path: "guardian-one/app/build/outputs/apk/debug/app-debug.apk"
        
