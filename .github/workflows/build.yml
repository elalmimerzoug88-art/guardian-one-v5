name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Extract and setup Android folder structure
      run: |
        if [ -f guardian-one.zip ]; then
          unzip -o guardian-one.zip
        fi
        
        # نقل المحتويات إذا كانت داخل مجلد guardian-one فرعي
        if [ -d "guardian-one" ]; then
          cp -rn guardian-one/* . || true
        fi
        
        # التأكد من صلاحيات التنفيذ لـ gradlew
        find . -name "gradlew" -exec chmod +x {} \;

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK with Gradle
      run: |
        # البحث عن ملف gradlew وتشغيله أينما وجد
        GRADLEW_PATH=$(find . -maxdepth 2 -name "gradlew" | head -n 1)
        if [ -n "$GRADLEW_PATH" ]; then
          DIR=$(dirname "$GRADLEW_PATH")
          cd "$DIR"
          ./gradlew assembleDebug --stacktrace
        else
          echo "لم يتم العثور على ملف gradlew"
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/*.apk"
        
